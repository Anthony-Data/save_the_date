<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save the Date · Anthony & Yona</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Dancing+Script:wght@700&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #2d4a3e;
    --green-mid: #3d6b58;
    --green-light: #5a8f78;
    --green-pale: #c8ddd4;
    --mocha-dark: #4a3728;
    --mocha-mid: #7a5c45;
    --mocha-light: #c4a882;
    --mocha-cream: #f5ede2;
    --red-seal: #c0392b;
    --red-seal-dark: #922b21;
    --gold: #d4af7a;
    --white: #faf8f4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--green-deep);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Jost', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(90,143,120,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(45,74,62,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 50%, rgba(61,107,88,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Decorative botanical elements */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 5% 5%, rgba(196,168,130,0.08) 0%, transparent 30%),
      radial-gradient(circle at 95% 95%, rgba(196,168,130,0.08) 0%, transparent 30%);
    pointer-events: none;
  }

  /* ── ENVELOPE ── */
  .scene {
    position: relative;
    width: 520px;
    max-width: 95vw;
    perspective: 1200px;
  }

  .envelope-wrap {
    position: relative;
    transition: transform 0.4s ease;
  }

  .envelope-wrap:not(.opened):hover {
    transform: scale(1.02) translateY(-4px);
  }

  .envelope {
    width: 100%;
    aspect-ratio: 1.6 / 1;
    position: relative;
    cursor: pointer;
    filter: drop-shadow(0 30px 60px rgba(0,0,0,0.5));
  }

  /* Envelope body */
  .env-body {
    position: absolute;
    inset: 0;
    background: linear-gradient(145deg, #3d6b58 0%, #2d4a3e 60%, #243d33 100%);
    border-radius: 4px;
    overflow: hidden;
  }

  .env-body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%),
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgba(255,255,255,0.01) 10px,
        rgba(255,255,255,0.01) 11px
      );
  }

  /* Bottom triangle */
  .env-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(160deg, #4a7d66 0%, #2d4a3e 50%, #1e3329 100%);
    clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
  }

  /* Side triangles */
  .env-left {
    position: absolute;
    top: 0; bottom: 0; left: 0;
    width: 52%;
    background: linear-gradient(135deg, #335c4a 0%, #2a4538 100%);
    clip-path: polygon(0% 0%, 100% 50%, 0% 100%);
  }

  .env-right {
    position: absolute;
    top: 0; bottom: 0; right: 0;
    width: 52%;
    background: linear-gradient(225deg, #335c4a 0%, #243d33 100%);
    clip-path: polygon(100% 0%, 0% 50%, 100% 100%);
  }

  /* Envelope flap (top) */
  .env-flap {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 55%;
    background: linear-gradient(180deg, #3d6b58 0%, #335c4a 100%);
    clip-path: polygon(0% 0%, 50% 100%, 100% 0%);
    transform-origin: top center;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 10;
  }

  .env-flap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
    clip-path: polygon(0% 0%, 50% 100%, 100% 0%);
  }

  /* Gold border lines on envelope */
  .env-lines {
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(212,175,122,0.25);
    border-radius: 2px;
    pointer-events: none;
    z-index: 5;
  }

  /* Initials on envelope */
  .env-initials {
    position: absolute;
    bottom: 18%;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: rgba(212,175,122,0.6);
    letter-spacing: 0.3em;
    z-index: 6;
    white-space: nowrap;
  }

  /* ── SEAL ── */
  .seal {
    position: absolute;
    top: calc(55% - 36px);
    left: 50%;
    transform: translateX(-50%);
    width: 72px;
    height: 72px;
    z-index: 20;
    cursor: pointer;
    transition: transform 0.3s ease, filter 0.3s ease;
  }

  .seal:hover {
    transform: translateX(-50%) scale(1.1) rotate(5deg);
    filter: drop-shadow(0 0 12px rgba(192,57,43,0.7));
  }

  .seal svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
  }

  /* Hint text */
  .hint {
    position: absolute;
    bottom: -36px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: rgba(200,221,212,0.5);
    white-space: nowrap;
    animation: pulse-hint 2.5s ease-in-out infinite;
  }

  @keyframes pulse-hint {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ── CARD (save the date image) ── */
  .card-container {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%) translateY(20px);
    width: 88%;
    opacity: 0;
    transition:
      transform 1s cubic-bezier(0.34, 1.56, 0.64, 1),
      opacity 0.6s ease;
    z-index: 8;
    pointer-events: none;
  }

  .card-container img {
    width: 100%;
    border-radius: 3px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,175,122,0.2);
  }

  /* ── OPENED STATE ── */
  .envelope-wrap.opened .env-flap {
    transform: rotateX(-180deg);
  }

  .envelope-wrap.opened .card-container {
    opacity: 1;
    pointer-events: auto;
  }

  /* ── HEADER TEXT ── */
  .page-header {
    position: fixed;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 1;
  }

  .page-header .names {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--mocha-light);
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .page-header .tagline {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    color: rgba(200,221,212,0.45);
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* ── FOOTER ── */
  .page-footer {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: rgba(200,221,212,0.3);
    letter-spacing: 0.1em;
    z-index: 1;
  }

  /* Floating particles */
  .particle {
    position: fixed;
    width: 3px;
    height: 3px;
    background: rgba(212,175,122,0.4);
    border-radius: 50%;
    pointer-events: none;
    animation: float-up linear infinite;
  }

  @keyframes float-up {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* Music icon */
  .music-icon {
    position: fixed;
    top: 24px;
    right: 28px;
    width: 36px;
    height: 36px;
    background: rgba(212,175,122,0.15);
    border: 1px solid rgba(212,175,122,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 100;
    transition: all 0.3s;
    opacity: 0;
  }

  .music-icon.visible {
    opacity: 1;
  }

  .music-icon:hover {
    background: rgba(212,175,122,0.3);
    transform: scale(1.1);
  }

  .music-icon svg {
    width: 16px;
    height: 16px;
    fill: var(--gold);
  }

  .music-icon.playing .note-anim {
    animation: spin 3s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Confetti burst on open */
  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 8px;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    border-radius: 1px;
  }

  .confetti-piece.burst {
    animation: confetti-fall 2s ease-out forwards;
  }

  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(300px) rotate(720deg) scale(0.5); opacity: 0; }
  }
</style>
</head>
<body>

<!-- Floating particles -->
<div id="particles"></div>

<!-- Music control -->
<div class="music-icon" id="musicIcon" onclick="toggleMusic()">
  <svg viewBox="0 0 24 24" class="note-anim">
    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
  </svg>
</div>

<!-- Header -->
<div class="page-header">
  <div class="names">Anthony & Yona</div>
  <div class="tagline">vous invitent à retenir la date</div>
</div>

<!-- Main scene -->
<div class="scene">
  <div class="envelope-wrap" id="envelopeWrap">

    <!-- Card that slides out -->
    <div class="card-container" id="card" style="top: calc(-88% + 20px);">
      <img id="savethedate-img" src="" alt="Save the Date Anthony & Yona">
    </div>

    <!-- Envelope -->
    <div class="envelope">
      <div class="env-body"></div>
      <div class="env-bottom"></div>
      <div class="env-left"></div>
      <div class="env-right"></div>
      <div class="env-lines"></div>
      <div class="env-initials">A · Y</div>
      <div class="env-flap" id="envFlap"></div>

      <!-- Wax seal -->
      <div class="seal" id="seal" onclick="openEnvelope()">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- Outer glow ring -->
          <circle cx="50" cy="50" r="48" fill="rgba(192,57,43,0.15)"/>
          <!-- Main seal body -->
          <circle cx="50" cy="50" r="44" fill="url(#sealGrad)"/>
          <!-- Decorative star edges -->
          <polygon points="50,4 53,8 57,5 58,10 63,8 62,13 67,13 64,17 69,19 65,22 69,26 64,27 67,32 62,31 63,37 58,34 57,40 53,36 50,42 47,36 43,40 42,34 37,37 38,31 33,32 36,27 31,26 35,22 31,19 36,17 33,13 38,13 37,8 42,10 43,5 47,8" fill="url(#sealGrad2)"/>
          <!-- Inner circle -->
          <circle cx="50" cy="50" r="32" fill="none" stroke="rgba(255,200,180,0.25)" stroke-width="1"/>
          <circle cx="50" cy="50" r="28" fill="rgba(150,30,20,0.3)"/>
          <!-- Monogram A & Y -->
          <text x="50" y="45" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="rgba(255,220,200,0.9)" letter-spacing="1">A &amp; Y</text>
          <!-- Decorative line -->
          <line x1="34" y1="50" x2="66" y2="50" stroke="rgba(255,200,180,0.4)" stroke-width="0.5"/>
          <!-- Date text -->
          <text x="50" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="rgba(255,220,200,0.7)" letter-spacing="0.5">2027</text>
          <!-- Gradients -->
          <defs>
            <radialGradient id="sealGrad" cx="40%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#e74c3c"/>
              <stop offset="50%" stop-color="#c0392b"/>
              <stop offset="100%" stop-color="#7b241c"/>
            </radialGradient>
            <radialGradient id="sealGrad2" cx="40%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#e74c3c"/>
              <stop offset="100%" stop-color="#922b21"/>
            </radialGradient>
          </defs>
        </svg>
      </div>
    </div>

    <div class="hint" id="hint">Cliquez sur le sceau pour ouvrir</div>
  </div>
</div>

<!-- Footer -->
<div class="page-footer">5 Juillet 2027 · Portugal</div>

<!-- Audio (free-use elegant waltz via CDN) -->
<audio id="bgMusic" loop preload="auto">
  <!-- We'll use a free romantic piano piece from a CDN -->
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
</audio>

  document.getElementById('savethedate-img').src = 'savethedate.jpeg;base64,' + IMG_DATA;

  // ── Particles ──
  const particleContainer = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (8 + Math.random() * 14) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
    p.style.background = Math.random() > 0.5
      ? 'rgba(212,175,122,0.35)'
      : 'rgba(200,221,212,0.25)';
    particleContainer.appendChild(p);
  }

  // ── Music ──
  const audio = document.getElementById('bgMusic');
  const musicIcon = document.getElementById('musicIcon');
  let musicPlaying = false;

  function toggleMusic() {
    if (musicPlaying) {
      audio.pause();
      musicIcon.classList.remove('playing');
    } else {
      audio.play().catch(() => {});
      musicIcon.classList.add('playing');
    }
    musicPlaying = !musicPlaying;
  }

  // ── Open envelope ──
  let opened = false;

  function openEnvelope() {
    if (opened) return;
    opened = true;

    const wrap = document.getElementById('envelopeWrap');
    const hint = document.getElementById('hint');
    const seal = document.getElementById('seal');

    // Hide hint
    hint.style.opacity = '0';
    hint.style.transition = 'opacity 0.3s';

    // Animate seal away
    seal.style.transition = 'transform 0.5s ease, opacity 0.5s ease';
    seal.style.transform = 'translateX(-50%) scale(0) rotate(180deg)';
    seal.style.opacity = '0';

    // Open flap after seal disappears
    setTimeout(() => {
      wrap.classList.add('opened');
    }, 300);

    // Show music icon
    setTimeout(() => {
      musicIcon.classList.add('visible');
      // Auto-play music
      audio.volume = 0;
      audio.play().then(() => {
        musicPlaying = true;
        musicIcon.classList.add('playing');
        // Fade in music
        let vol = 0;
        const fadeIn = setInterval(() => {
          vol = Math.min(vol + 0.03, 0.65);
          audio.volume = vol;
          if (vol >= 0.65) clearInterval(fadeIn);
        }, 80);
      }).catch(() => {
        // Autoplay blocked — icon still shows
      });
    }, 800);

    // Confetti burst
    setTimeout(() => spawnConfetti(), 600);
  }

  function spawnConfetti() {
    const colors = ['#c0392b', '#d4af7a', '#5a8f78', '#c8ddd4', '#f5ede2', '#3d6b58'];
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;

    for (let i = 0; i < 40; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const angle = (Math.random() * 360) * Math.PI / 180;
      const dist = 80 + Math.random() * 200;
      el.style.left = (cx + Math.cos(angle) * dist * 0.3) + 'px';
      el.style.top = (cy - 80 + Math.random() * 40) + 'px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width = (4 + Math.random() * 6) + 'px';
      el.style.height = (4 + Math.random() * 8) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '1px';
      el.style.animationDelay = (Math.random() * 0.4) + 's';
      document.body.appendChild(el);

      // Custom trajectory
      const tx = (Math.random() - 0.5) * 400;
      el.style.setProperty('--tx', tx + 'px');
      el.animate([
        { transform: 'translate(0,0) rotate(0deg) scale(1)', opacity: 1 },
        { transform: `translate(${tx}px, ${200 + Math.random() * 200}px) rotate(${360 + Math.random()*360}deg) scale(0.3)`, opacity: 0 }
      ], {
        duration: 1800 + Math.random() * 800,
        delay: Math.random() * 400,
        easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
        fill: 'forwards'
      });

      setTimeout(() => el.remove(), 3000);
    }
  }
</script>
